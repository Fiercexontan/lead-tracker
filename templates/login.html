<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lincoln Adura – Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060910;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.07);
      --blue: #63b3ed;
      --purple: #9f7aea;
      --teal: #4fd1c5;
      --gold: #f6c90e;
      --text: #f0f4ff;
      --muted: #8892a4;
      --red: #fc8181;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .blob1 {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.15), transparent);
      top: -150px; left: -100px;
      filter: blur(100px);
      pointer-events: none;
    }

    .blob2 {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14,165,233,0.12), transparent);
      bottom: -100px; right: -100px;
      filter: blur(100px);
      pointer-events: none;
    }

    .grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(99,179,237,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,179,237,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .login-card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 50px 44px;
      width: 100%;
      max-width: 420px;
      margin: 20px;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
      border-radius: 20px 20px 0 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 30px;
    }

    .logo .g { color: var(--gold); }
    .logo .b { color: var(--text); }

    .login-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
    }

    .login-sub {
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 32px;
    }

    .error-box {
      background: rgba(252,129,129,0.08);
      border: 1px solid rgba(252,129,129,0.2);
      color: var(--red);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      text-align: center;
    }

    label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 13px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border 0.3s;
      margin-bottom: 24px;
    }

    input:focus { border-color: var(--blue); }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.5px;
      transition: all 0.3s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 35px rgba(99,179,237,0.3);
    }
  </style>
</head>
<body>

  <div class="blob1"></div>
  <div class="blob2"></div>
  <div class="grid"></div>

  <div class="login-card">
    <div class="logo"><span class="g">LINCOLN</span> <span class="b"> ADURA</span></div>
    <div class="login-title">Admin Login 🔐</div>
    <p class="login-sub">Enter your password to access the lead dashboard</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required autofocus />
      <button type="submit" class="login-btn">Login →</button>
    </form>
  </div>

</body>
</html>
